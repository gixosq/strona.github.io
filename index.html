<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dr adw. Klaudia Kaniecka | Doradztwo Prawno-Podatkowe</title>
    <style>
        :root {
            --charcoal: #1a1a1a;
            --bone: #f9f9f9;
            --gold: #c5a059;
            --gold-muted: #d4bc8d;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #062335;
            color: var(--charcoal);
            font-family: "Minion Pro", "Times New Roman", serif;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- LOGO NA GÓRZE --- */
        nav {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vh 2vw;
        }

        .nav-logo {
            width: min(980px, 84vw);
            aspect-ratio: 2.7 / 1.7;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo object,
        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: var(--transition);
        }



        /* --- TEKST PO ŚRODKU (HERO) --- */
        header {
            height: 100vh;
            display: flex;
            align-items: center; /* Centrowanie pionowe */
            justify-content: flex-start; /* Tekst od lewej, ale w centrum wysokości */
        }

        .hero-content {
            max-width: 850px;
        }

        .hero-subtitle {
            font-family: "Minion Pro", "Times New Roman", serif;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: block;
        }

        h1 {
            font-family: "Minion Pro", "Times New Roman", serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .hero-vp {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-style: italic;
            font-family: "Minion Pro", "Times New Roman", serif;
            max-width: 550px;
            border-left: 1px solid var(--gold);
            padding-left: 2rem;
            color: #333;
        }

        .about { padding: 160px 0; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .about-title { font-size: 2.5rem; font-family: "Minion Pro", "Times New Roman", serif; }
        .about-text { font-size: 1.1rem; color: #444; }
        .about-text p { margin-bottom: 1.5rem; }

        /* Ekspertyza */
        .expertise { padding-bottom: 160px; }
        .expertise-grid { display: grid; grid-template-columns: repeat(5, minmax(220px, 1fr)); gap: 2px; }
        .expertise-item { background-color: #062335; color: #d7dbe1; border: 1px solid rgba(215, 219, 225, 0.25); padding: 60px 40px; transition: var(--transition); }
        .expertise-item:hover { background-color: #0a2b41; }
        .expertise-number { color: #9fb7c8; font-size: 0.8rem; display: block; margin-bottom: 2rem; }
        .expertise-item h3 { font-family: "Minion Pro", "Times New Roman", serif; font-size: 1.55rem; line-height: 1.25; letter-spacing: 0.01em; margin-bottom: 1rem; color: #f3f6fa; }
        .expertise-item p { font-size: 1.02rem; line-height: 1.72; }
        .expertise-contact {
            margin-top: 48px;
            text-align: center;
            font-size: 1rem;
            line-height: 1.85;
            letter-spacing: 0.01em;
            color: #d7dbe1;
        }
        .expertise-contact a {
            color: inherit;
            text-decoration: none;
        }

        /* Footer */
        footer { padding: 100px 0 60px; text-align: center; border-top: 1px solid #eee; }
        .contact-link { font-family: "Minion Pro", "Times New Roman", serif; font-size: clamp(1.5rem, 5vw, 2.5rem); display: block; margin-bottom: 1rem; }
        .social-links a { margin: 0 15px; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; }

        @media (max-width: 768px) {
            .about-grid { grid-template-columns: 1fr; }
            header { height: 90vh; }
            .container { padding: 0 20px; }
            .expertise-grid {
                grid-template-columns: 1fr;
            }
            .nav-logo object,
            .nav-logo img {
                width: 100%;
                height: 100%;
            }
            .expertise-contact {
                font-size: 0.95rem;
                line-height: 1.75;
            }
        }
    </style>
</head>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
